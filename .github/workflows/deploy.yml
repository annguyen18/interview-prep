name: Build and Deploy to VPS

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lowercase repository name for GHCR compatibility
        run: |
          echo "IMAGE_NAME_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lowercase repository name for GHCR compatibility
        run: |
          echo "IMAGE_NAME_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Create target directory on VPS if not exists
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            mkdir -p /home/${{ secrets.VPS_USER }}/apps/interview-prep

      - name: Copy deployment files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/home/${{ secrets.VPS_USER }}/apps/interview-prep"
          rm: false

      - name: Deploy image and run container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            cd /home/${{ secrets.VPS_USER }}/apps/interview-prep
            # Login to GitHub Container Registry
            echo "${{ secrets.CR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            # Pull the new image from GHCR
            docker compose pull
            # Start the container
            docker compose up -d --remove-orphans
            
            # Wait and check container health status
            echo "Waiting for container health status to be healthy..."
            for i in {1..20}; do
              STATUS=$(docker inspect --format='{{json .State.Health.Status}}' interview-prep-backend 2>/dev/null || echo "null")
              echo "Health status: $STATUS"
              if [ "$STATUS" = "\"healthy\"" ]; then
                echo "Container is healthy!"
                break
              fi
              if [ "$STATUS" = "\"unhealthy\"" ]; then
                echo "Container is unhealthy!"
                docker logs interview-prep-backend
                exit 1
              fi
              sleep 2
            done
            
            # Final verification
            FINAL_STATUS=$(docker inspect --format='{{json .State.Health.Status}}' interview-prep-backend 2>/dev/null || echo "null")
            if [ "$FINAL_STATUS" != "\"healthy\"" ]; then
              echo "Container failed to report healthy status in time!"
              docker logs interview-prep-backend
              exit 1
            fi
            
            # Clean up old dangling images
            docker image prune -f || true
