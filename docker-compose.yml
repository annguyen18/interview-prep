version: '3.8'

services:
  app:
    image: ghcr.io/annguyen18/interview-prep:latest
    container_name: interview-prep-backend
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    environment:
      - PORT=7070
      - APP_ENV=production
      - DB_PATH=/app/data/interview_prep.db
      - ALLOWED_ORIGINS=https://interview-prep.antnguyen.dev
    networks:
      - caddy-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:7070/api/v1/questions"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  caddy-network:
    external: true
